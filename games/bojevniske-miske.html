<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="../favicon.svg" type="image/svg+xml" />
  <title data-i18n-doctitle="bm_title">Bojevniške miške</title>
  <meta name="description" content="Igre in stripi, ki jih ustvarjajo bratje Simon, Jakob in Andrej." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.akcijazavse.si/" />
  <meta property="og:title" content="Akcija za vse" />
  <meta property="og:description" content="Igre in stripi, ki jih ustvarjajo bratje Simon, Jakob in Andrej." />
  <meta property="og:image" content="https://www.akcijazavse.si/assets/og.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.akcijazavse.si/assets/og.jpg" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="../index.html">
      <span class="brand-mark">⚡</span>
      <span class="brand-name" data-i18n="site_title">Akcija za vse</span>
    </a>
    <div class="header-actions">
      <button id="lang-btn" class="lang-btn">EN</button>
      <button class="share-btn" data-share data-i18n="nav_share">Deli</button>
      <button class="donate-btn" data-open-donate data-i18n="nav_donate">Doniraj ♥</button>
    </div>
  </header>

  <div id="wrap">
    <a class="back-link" href="../index.html" data-i18n="back_home">← Nazaj na domov</a>
    <h1 id="game-title" data-i18n="bm_title">🐭 Bojevniške miške ⚔️</h1>
    <div id="stage">
      <canvas id="game" width="900" height="540"></canvas>
      <!-- prekrivni sloj za matematična srečanja in menije (HTML) -->
      <div id="ui-overlay"></div>
    </div>
    <p id="hint" data-i18n-html="bm_hint"></p>
  </div>

  <!-- okno za donacije -->
  <div id="donate-modal" class="modal">
    <div class="modal-box">
      <button class="modal-x" data-close-donate aria-label="x">✕</button>
      <h2 data-i18n="donate_heading">Podpri ekipo ♥</h2>
      <p data-i18n="donate_text">Hvala za podporo!</p>
      <div id="donate-links" class="donate-links"></div>
      <h3 data-i18n="donate_bank_heading">Ali nakaži na račun:</h3>
      <div id="donate-qr" class="donate-qr-wrap"></div>
      <pre id="donate-bank" class="donate-bank"></pre>
      <button class="ghost-btn" data-close-donate data-i18n="donate_close">Zapri</button>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/share.js"></script>
  <script src="../js/page.js"></script>

  <!-- 3D pogon (three.js, lokalno vendoriran ES modul) -->
  <script type="importmap">
    { "imports": { "three": "./vendor/three.module.min.js" } }
  </script>
  <script type="module" src="bojevniske-miske.js"></script>
</body>
</html>

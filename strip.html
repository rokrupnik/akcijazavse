<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-doctitle="site_title">Strip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">⚡</span>
      <span class="brand-name" data-i18n="site_title">Akcija za vse</span>
    </a>
    <div class="header-actions">
      <button id="lang-btn" class="lang-btn">EN</button>
      <button class="donate-btn" data-open-donate data-i18n="nav_donate">Doniraj ♥</button>
    </div>
  </header>

  <main class="reader">
    <a class="back-link" href="index.html" data-i18n="back_home">← Nazaj na domov</a>
    <h1 id="comic-title" class="reader-title"></h1>
    <p id="comic-author" class="reader-author"></p>

    <div class="reader-stage">
      <button id="prev" class="nav-arrow left" aria-label="prev">‹</button>
      <img id="comic-page" class="comic-page" alt="strip" />
      <button id="next" class="nav-arrow right" aria-label="next">›</button>
    </div>

    <div class="reader-controls">
      <button id="prev2" class="ghost-btn" data-i18n="comic_prev">‹ Nazaj</button>
      <span id="page-ind" class="page-ind">1 / 1</span>
      <button id="next2" class="ghost-btn" data-i18n="comic_next">Naprej ›</button>
    </div>
  </main>

  <!-- okno za donacije -->
  <div id="donate-modal" class="modal">
    <div class="modal-box">
      <button class="modal-x" data-close-donate aria-label="x">✕</button>
      <h2 data-i18n="donate_heading">Podpri ekipo ♥</h2>
      <p data-i18n="donate_text">Hvala za podporo!</p>
      <div id="donate-links" class="donate-links"></div>
      <h3 data-i18n="donate_bank_heading">Ali nakaži na račun:</h3>
      <pre id="donate-bank" class="donate-bank"></pre>
      <button class="ghost-btn" data-close-donate data-i18n="donate_close">Zapri</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/strip.js"></script>
</body>
</html>
